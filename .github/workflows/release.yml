name: Automated Public Release Generation

on:
  push:
    branches: [ main ]

jobs:
  release_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the cloud runner permission to create a public release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        validate-wrappers: false

    - name: Regenerate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore

    # We pass the cloud build number directly into the compilation step automatically
    - name: Compile Automated Release APK
      run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"

    - name: Distribute Release APK to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      if: ${{ secrets.FIREBASE_APP_ID != '' && (secrets.FIREBASE_CREDENTIALS != '' || secrets.FIREBASE_SERVICE_ACCOUNT != '') }}
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS || secrets.FIREBASE_SERVICE_ACCOUNT }}
        groups: testers
        file: app/build/outputs/apk/release/app-release.apk
        releaseNotes: "Automated release build #${{ github.run_number }} uploaded via GitHub Actions."

    - name: Generate Public GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Automated build updates compiled successfully via GitHub Actions.
          Tracking Identifier: Build #${{ github.run_number }}
        files: app/build/outputs/apk/release/app-release.apk
